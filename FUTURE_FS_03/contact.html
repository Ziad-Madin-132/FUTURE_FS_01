<body>

<nav>
  <div class="logo">Delizia</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>

  <div class="hamburger">
    <span></span>

<section class="contact fade-in">
  <h2>Contact Us</h2>
  <div class="contact-container">
    <div class="contact-card fade-in">
      <h3>Get in Touch</h3>
      <p>Email: <a href="mailto:info@delizia.com">info@delizia.com</a></p>
      <p>Phone: <a href="tel:+1234567890">+123 456 7890</a></p>
      <p>Address: 123 Main Street, City</p>
    </div>
    <div class="contact-card fade-in">
      <h3>Send a Message</h3>
      <form id="contactForm">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
        <button type="submit" class="btn">Send</button>
        <p id="contactConfirmation" style="color:green; display:none;">Message sent!</p>
      </form>
    </div>
  </div>
  <div class="map fade-in">
    <iframe src="https://maps.google.com/maps?q=123%20Main%20Street&t=&z=13&ie=UTF8&iwloc=&output=embed" width="100%" height="300" style="border:0;"></iframe>
  </div>
</section>

<script src="js/script.js"></script>
</body>
</html>
